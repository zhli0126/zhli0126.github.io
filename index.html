  <style>
    :root {
      --ink: #111111;
      --muted: #555555;
      --line: #e7e7e7;
      --link: #0645ad;
      --paper: #ffffff;
      --terminal: #0d1117;
      --terminal-link: #58a6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.55;
    }

    a {
      color: var(--link);

    }

    a:hover {

    }

    .language-switch {
      position: fixed;
      top: 18px;
      right: 22px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .language-switch button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 11px;
      color: var(--muted);
      background: #ffffff;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .language-switch button.is-active {
      color: #ffffff;
      border-color: var(--ink);
      background: var(--ink);
    }

    .site {
      width: min(760px, calc(100% - 36px));
      margin: 0 auto;
      padding: 58px 0 72px;
      text-align: center;
    }

    .photo {
      width: 178px;
      height: 178px;
      margin: 0 auto 24px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 34%;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.15;
    }

    .intro {
      max-width: 560px;
      margin: 0 auto 20px;
      color: var(--muted);
      font-size: 17px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 18px;
      margin: 24px 0 10px;
      padding: 0;
      list-style: none;
    }

    .nav button,
    .nav a {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--link);
      font: inherit;
      font-size: 16px;
      cursor: pointer;
    }

    .nav button:hover {
      text-decoration: underline;
    }

    .panel {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-4px);
      transition: max-height 220ms ease, opacity 180ms ease, transform 180ms ease;
      text-align: left;
    }

    .panel.is-open {
      max-height: 860px;
      opacity: 1;
      transform: translateY(0);
    }

    .terminal {
      margin: 24px auto 0;
      padding: 16px;
      border-radius: 6px;
      background: var(--terminal);
      color: #ffffff;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.48;
    }

    .terminal a {
      color: var(--terminal-link);
      text-decoration: underline;
    }

    .terminal-output {
      display: block;
      min-height: 86px;
      margin: 0;
      color: #ffffff;
      font: inherit;
      white-space: pre-wrap;
    }

    .terminal-output.is-typing::after {
      content: "_";
      display: inline-block;
      margin-left: 2px;
      color: #ffffff;
      animation: blink 1s steps(2, start) infinite;
    }

    footer {
      margin-top: 36px;
      color: #888888;
      font-size: 13px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      .language-switch {
        position: static;
        justify-content: flex-end;
        width: min(760px, calc(100% - 36px));
        margin: 16px auto 0;
      }

      .site {
        padding-top: 28px;
      }

      .photo {
        width: 142px;
        height: 142px;
      }

      h1 {
        font-size: 30px;
      }

      .intro {
        font-size: 16px;
      }

      .nav {
        gap: 8px 14px;
      }
    }
  </style>

    const buttons = document.querySelectorAll("[data-panel]");
    const panels = document.querySelectorAll(".panel");
    const languageButtons = document.querySelectorAll("[data-lang-button]");
    let currentLanguage = "zh";
    let activeTyping = 0;

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function linkify(value) {
      const escaped = escapeHtml(value);
      return escaped
        .replace(
          /(https?:\/\/[^\s]+)/g,
          '<a href="$1" target="_blank" rel="noreferrer">$1</a>'
        )
        .replace(
          /([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,})/gi,
          '<a href="mailto:$1">$1</a>'
        );
    }

    function closePanels() {
      activeTyping += 1;

      panels.forEach((panel) => {
        panel.classList.remove("is-open");
        panel.setAttribute("aria-hidden", "true");
        const output = panel.querySelector(".terminal-output");
        output.textContent = "";
        output.classList.remove("is-typing");
      });
    }

    function typeTerminal(panel) {
      const runId = ++activeTyping;
      const output = panel.querySelector(".terminal-output");
      const text = content[currentLanguage].panels[panel.id];
      let index = 0;

      output.textContent = "";
      output.classList.add("is-typing");

      function typeNext() {
        if (runId !== activeTyping || !panel.classList.contains("is-open")) {
          return;
        }

        output.textContent = text.slice(0, index);

        if (index < text.length) {
          index += 1;
          window.setTimeout(typeNext, text[index - 1] === "\n" ? 70 : 14);
          return;
        }

        output.classList.remove("is-typing");
        output.innerHTML = linkify(text);
      }

      typeNext();
    }

    function setLanguage(language) {
      currentLanguage = language;
      document.documentElement.lang = language === "zh" ? "zh-CN" : "en";

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = content[language][key];
      });

      languageButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.langButton === language);
      });

      closePanels();
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const target = document.getElementById(button.dataset.panel);
        const isOpen = target.classList.contains("is-open");

        closePanels();

        if (!isOpen) {
          target.classList.add("is-open");
          target.setAttribute("aria-hidden", "false");
          typeTerminal(target);
        }
      });
    });

    languageButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.langButton);
      });
    });
